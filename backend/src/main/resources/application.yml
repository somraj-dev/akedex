spring:
  application:
    name: acadex-platform

  datasource:
    url: jdbc:postgresql://localhost:5432/acadex
    username: acadex
    password: acadex_secret
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

acadex:
  jwt:
    secret: acadex-jwt-secret-key-change-in-production-min-256-bits-long-value
    expiration: 86400000  # 24 hours
    refresh-expiration: 604800000  # 7 days

  cors:
    allowed-origins: http://localhost:3000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
