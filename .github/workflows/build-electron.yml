name: Build Electron App

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build & Package Windows Desktop Installer
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Build Next.js Static Export & Electron App
        run: |
          cd frontend
          npm run package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Installer Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Acadex-Windows-Installer
          path: frontend/dist/*.exe
          if-no-files-found: ignore
